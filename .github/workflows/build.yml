name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\ZanarkandWorkshop.sln

      - name: Build
        run: dotnet build .\ZanarkandWorkshop.sln -c Release --no-restore

  package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build release package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          .\scripts\build-release.ps1 -Version $version

      - name: Create draft GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $archive = Get-ChildItem -LiteralPath .\artifacts -Filter '*.zip' | Select-Object -First 1
          gh release create "${{ github.ref_name }}" $archive.FullName --draft --generate-notes --title "Zanarkand Workshop ${{ github.ref_name }}"
